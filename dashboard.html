<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder Blueprint — Teacher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1f2733;--muted:#6b7688;--brand:#2563eb;--brand2:#7c3aed;--good:#16a34a;--line:#e4e9f2}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Nunito','Segoe UI',Arial,sans-serif;background:linear-gradient(180deg,#eaf1ff,#f5edff);min-height:100vh;color:var(--ink)}
  .wrap{max-width:1040px;margin:0 auto;padding:22px 18px 80px}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:28px;margin:0;background:linear-gradient(90deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .gate{max-width:400px;margin:12vh auto;background:#fff;border-radius:20px;padding:32px;box-shadow:0 18px 50px rgba(0,0,0,.15);text-align:center}
  .gate h1{font-size:26px}
  input,button{font-family:inherit}
  input[type=text],input[type=password]{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;margin-top:10px}
  .btn{border:none;border-radius:11px;padding:10px 16px;font-weight:800;font-size:14px;cursor:pointer;background:var(--brand);color:#fff}
  .btn.ghost{background:#eef2f8;color:var(--ink)}
  .btn.full{width:100%;margin-top:16px;padding:12px}
  .bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .bar .sp{margin-left:auto;display:flex;gap:8px}
  .pill{background:#eef2ff;color:var(--brand);font-weight:800;font-size:13px;padding:5px 12px;border-radius:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 4px 14px rgba(20,30,60,.05);cursor:pointer;transition:transform .15s}
  .card:hover{transform:translateY(-3px)}
  .card h3{margin:0 0 2px;font-size:17px}
  .card .co{color:var(--muted);font-size:13px;min-height:16px}
  .prog{height:12px;background:#eef2f8;border-radius:20px;overflow:hidden;margin:12px 0 6px}
  .prog > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--good))}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
  .empty{background:#fff;border:1px dashed var(--line);border-radius:16px;padding:40px;text-align:center;color:var(--muted)}
  /* detail modal */
  .modal{position:fixed;inset:0;background:rgba(20,15,40,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:24px;overflow:auto}
  .modal.show{display:flex}
  .sheet{background:#fff;border-radius:20px;max-width:760px;width:100%;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.3)}
  .sheet .x{float:right;cursor:pointer;font-size:22px;color:var(--muted);border:none;background:none}
  .sec{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:12px}
  .sec h4{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--brand)}
  .kv{margin:4px 0;font-size:14px}
  .kv b{color:#334}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
  .tags span{background:#eef2ff;border-radius:12px;padding:2px 9px;font-size:12px}
  .ai{background:#faf7ff;border:1px solid #e6ddfb;border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13.5px;white-space:pre-wrap}
  .ai .who{font-weight:800;color:var(--brand2);font-size:12px;display:block;margin-bottom:3px}
  img.logo{max-width:120px;max-height:100px;border:1px solid var(--line);border-radius:8px;padding:3px;margin-top:6px}
  .err{color:#dc2626;font-weight:700;font-size:13px;min-height:16px;margin-top:8px}
  @media print{.bar,.card{cursor:auto}.modal{position:static;background:none;display:block;padding:0}.sheet{box-shadow:none;max-width:none}.x{display:none}}
</style>
</head>
<body>

<div id="gate" class="gate">
  <h1>👩‍🏫 Teacher Dashboard</h1>
  <p style="color:var(--muted)">Enter your class code to see every student's Founder Blueprint.</p>
  <input type="text" id="cc" placeholder="Class code (e.g. FOUNDERS7)" oninput="this.value=this.value.toUpperCase()">
  <div class="err" id="err"></div>
  <button class="btn full" onclick="openClass()">View class →</button>
</div>

<div class="wrap" id="board" style="display:none">
  <div class="bar">
    <h1>Founder Blueprint</h1>
    <span class="pill" id="ccPill"></span>
    <span class="pill" id="countPill"></span>
    <div class="sp">
      <button class="btn ghost" onclick="load()">↻ Refresh</button>
      <button class="btn ghost" onclick="window.print()">🖨 Print</button>
      <button class="btn ghost" onclick="switchClass()">Change class</button>
    </div>
  </div>
  <div id="cards" class="grid"></div>
  <div id="none" class="empty" style="display:none">No students yet. Share the class code and the app link — they'll show up here as they start.</div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script>
const SB_URL="https://zzawnvosskllubxxfmhg.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6YXdudm9zc2tsbHVieHhmbWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0Mzc3NzAsImV4cCI6MjA5OTAxMzc3MH0.Bl4HW8rrTvWRv2ASk0mCdzp_0jhzzcoPqfO6OHMU9D8";
const H={apikey:SB_KEY,Authorization:"Bearer "+SB_KEY};
let CLASS="", rows=[], timer=null;

const GROUPS={
  kind:["Physical product","Service","App","Website","Mix"],
  feat:["saves time","solves a problem","is an app or website","is a service","teaches or helps you learn","keeps you organized","connects people","is fun or entertaining","is personalized","is eco-friendly","is inclusive / for everyone","keeps you safe","helps with money","is a subscription","is collectible","is delicious","is beautiful"],
  need:["Save time","Save money","Have more fun","Get organized","Feel included","Learn something","Stay safe","Look or feel good","A great gift","Something unique"],
  model:["One-time sale","Subscription","Freemium","Virtual currency / in-app buys","Ads","Service fee","Pay what you want"],
  sales:["Smile","Let them hold / try it","Tell a story","Explain the problem","Show how it works","Ask questions","Give examples"],
  launch:["Logo finished","Product / service ready","Price decided","Marketing card finished","Pitch memorized","Booth ready"],
  nextacts:["Make a real sample","Get feedback from 3 people","Improve the price","Practice the pitch","Build a simple version","Tell more customers","Design a better logo"],
};
const SECTIONS=[
  {id:"company",title:"Company",fields:[["companyName","Company"],["founder2","Founder(s)"],["mission_who","Mission — who"],["mission_how","Mission — how"]]},
  {id:"brand",title:"Brand",fields:[["brandFeeling","Feeling"]],img:"img_logo"},
  {id:"product",title:"Product / Service",fields:[["productName","Name"],["productDesc","Description"],["featOther","Other feature"]],groups:[["kind","Type"],["feat","Qualities"]]},
  {id:"customer",title:"Customer",fields:[["custProblem","Problem"],["custAgeGroup","Age group"],["custNeeds","Needs"],["needOther","Need (own words)"]],groups:[["need","Biggest need"]]},
  {id:"competition",title:"Competition",fields:[["compAlt","Competitors"],["compBetter","What's different"]]},
  {id:"money",title:"Money",fields:[["mMaterials","Cost/make"],["mPackaging","Extra cost"],["mPrice","Price"]],groups:[["model","Money model"]]},
  {id:"marketing",title:"Marketing",fields:[["slogan","Slogan"],["posterHeadline","Poster headline"],["posterTag","Catchphrase"],["posterPrice","Price on poster"]],img:"img_posterImg"},
  {id:"sales",title:"Sales",fields:[["obj1","“That's expensive” reply"],["obj2","“Don't need it” reply"]],groups:[["sales","Tactics"]]},
  {id:"pitch",title:"Pitch",fields:[["pitch1","I'm"],["pitch2","I created"],["pitch3","Perfect for"],["pitch4","It solves"],["pitch5","Price"]]},
  {id:"checklist",title:"Launch checklist",groups:[["launch","Done"]]},
  {id:"next",title:"Next steps",fields:[["nextImprove","First improvement"],["nextShow","Show to"],["nextGrow","Grow by"],["nextGoal","1-month goal"]],groups:[["nextacts","Next moves"]]},
];

function openClass(){
  const c=(document.getElementById("cc").value||"").trim().toUpperCase();
  if(c.length<3){ document.getElementById("err").textContent="Enter your class code."; return; }
  CLASS=c;
  try{ localStorage.setItem("fb_teacher_class",CLASS); }catch(e){}
  document.getElementById("gate").style.display="none";
  document.getElementById("board").style.display="block";
  document.getElementById("ccPill").textContent="Class: "+CLASS;
  load();
  clearInterval(timer); timer=setInterval(load,20000); // auto-refresh
}
function switchClass(){ clearInterval(timer); document.getElementById("board").style.display="none"; document.getElementById("gate").style.display="block"; }

async function load(){
  try{
    const q=`${SB_URL}/rest/v1/blueprints?class_code=eq.${encodeURIComponent(CLASS)}&select=*&order=progress.desc`;
    const r=await fetch(q,{headers:H});
    rows=await r.json();
    if(!Array.isArray(rows)) rows=[];
    render();
  }catch(e){ document.getElementById("cards").innerHTML="<div class='empty'>Couldn't load. Check your connection and refresh.</div>"; }
}
function render(){
  document.getElementById("countPill").textContent=rows.length+(rows.length===1?" student":" students");
  document.getElementById("none").style.display=rows.length?"none":"block";
  document.getElementById("cards").innerHTML=rows.map((row,i)=>{
    const d=row.data||{}; const co=d.companyName||"—"; const pr=row.progress||0;
    const when=row.updated_at?timeAgo(new Date(row.updated_at)):"";
    return `<div class="card" onclick="openStudent(${i})">
      <h3>${esc(row.student_name)}</h3>
      <div class="co">${esc(co)}</div>
      <div class="prog"><i style="width:${pr}%"></i></div>
      <div class="meta"><span>${pr}% complete</span><span>${when}</span></div>
    </div>`;
  }).join("");
}
function openStudent(i){
  const row=rows[i]; const d=row.data||{}; const ao=row.ai_outputs||{};
  let html=`<button class="x" onclick="closeModal()">✕</button>
    <h1 style="font-size:24px">${esc(row.student_name)}</h1>
    <div class="co" style="color:var(--muted)">${esc(d.companyName||"")} · ${row.progress||0}% complete</div>`;
  SECTIONS.forEach(sec=>{
    let body="";
    (sec.fields||[]).forEach(([id,label])=>{ if(d[id]!==undefined && (""+d[id]).trim()!=="") body+=`<div class="kv"><b>${label}:</b> ${esc(d[id])}</div>`; });
    (sec.groups||[]).forEach(([g,label])=>{ const items=checked(d,g); if(items.length) body+=`<div class="kv"><b>${label}:</b></div><div class="tags">${items.map(x=>`<span>${esc(x)}</span>`).join("")}</div>`; });
    if(sec.img && d[sec.img]) body+=`<img class="logo" src="${d[sec.img]}">`;
    if(ao[sec.id]) body+=`<div class="ai"><span class="who">🤖 AI feedback</span>${esc(ao[sec.id])}</div>`;
    if(body) html+=`<div class="sec"><h4>${sec.title}</h4>${body}</div>`;
  });
  document.getElementById("sheet").innerHTML=html;
  document.getElementById("modal").classList.add("show");
}
function closeModal(){ document.getElementById("modal").classList.remove("show"); }
document.getElementById("modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeModal(); });

function checked(d,group){ const out=[]; (GROUPS[group]||[]).forEach((label,i)=>{ if(d["chk_"+group+"_"+i]) out.push(label); }); return out; }
function esc(s){ return (s+"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c])); }
function timeAgo(dt){ const s=Math.floor((Date.now()-dt)/1000); if(s<60)return"just now"; if(s<3600)return Math.floor(s/60)+"m ago"; if(s<86400)return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; }

// prefill last class
try{ const c=localStorage.getItem("fb_teacher_class"); if(c) document.getElementById("cc").value=c; }catch(e){}
</script>
</body>
</html>
